services:
  - type: web
    name: team-task-manager-api
    runtime: python
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
